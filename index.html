const CONFIG = {
  // 1) Booking alerts email. Make a free key at web3forms.com registered to this address.
  WEB3FORMS_KEY: "a5ab0836-bb11-4635-bdf9-55bb4b748812",

  // 2) Firebase (paste config to save bookings + prices permanently across all phones).

  MANAGER_PIN: "1234",

  PROPERTY_NAME: "Midtown Inn",

  // Starting rooms/prices (you can later edit all of these from the Manager screen).
  OVERNIGHT: [
    { id: "queen",  name: "Standard Queen", beds: "1 queen bed",   sleeps: 2, weekday: 90,  weekend: 130, allocation: 2 },
    { id: "double", name: "Double Room",     beds: "2 double beds", sleeps: 4, weekday: 110, weekend: 145, allocation: 1 },
    { id: "king",   name: "King Room",        beds: "1 king bed",   sleeps: 2, weekday: 95,  weekend: 135, allocation: 1 },
    { id: "deluxe", name: "Deluxe Room",      beds: "1 king bed",   sleeps: 3, weekday: 95,  weekend: 135, allocation: 1 },

    { id: "slot1", name: "Morning Rest",   beds: "9:00 AM – 2:00 PM", tag: "Rest & relax",        sleeps: 2, price: 74.50, allocation: 2 },

};

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { theme: { extend: {
    colors: { ivory:"#F6F2E9", card:"#FFFDF8", ink:"#18211C", green:"#1E4034",

<body class="font-sans text-ink min-h-screen">
<div id="app"></div>

<script>
/* ───────── helpers ───────── */
const today = () => new Date().toISOString().slice(0,10);
const addDays = (s,n)=>{const d=new Date(s+"T00:00:00");d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);};
const fmt = s => new Date(s+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const validEmail = e => /\S+@\S+\.\S+/.test(e);
const money = n => Number.isInteger(Number(n)) ? Number(n) : Number(n).toFixed(2);
const esc = s => (s==null?"":String(s)).replace(/"/g,"&quot;");

/* ───────── live inventory (editable in Manager) ───────── */
let LIVE = {
  overnight: JSON.parse(JSON.stringify(CONFIG.OVERNIGHT)),
  daytime:   JSON.parse(JSON.stringify(CONFIG.DAYTIME)),
};

let S = {
  view:"book", step:1, type:"overnight", roomId:null,
  checkIn:today(), checkOut:addDays(today(),1), date:today(),
  guests:1, name:"", email:"", phone:"", note:"",
  busy:false, error:"", confirmation:null,
  mgrAuthed:false, mgrPin:"", mgrMsg:"",
};
let BOOKINGS = [];
let db = null;

/* ───────── firebase (optional) ───────── */
async function initFirebase(){
  if(!CONFIG.FIREBASE || !CONFIG.FIREBASE.projectId) return;
  try{
    const app = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    const fs  = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
    const a = app.initializeApp(CONFIG.FIREBASE);
    db = fs.getFirestore(a); db._fs = fs;
    const snap = await fs.getDocs(fs.collection(db,"bookings"));
    BOOKINGS = snap.docs.map(d=>d.data());
    const sref = fs.doc(db,"settings","inventory");
    const ssnap = await fs.getDoc(sref);
    if(ssnap.exists()){ const d=ssnap.data(); if(d.overnight) LIVE.overnight=d.overnight; if(d.daytime) LIVE.daytime=d.daytime; }
  }catch(e){ console.warn("Firebase off, memory mode:", e.message); db=null; }
}
async function saveSettings(){
  if(!db) return true;
  try{ const fs=db._fs; await fs.setDoc(fs.doc(db,"settings","inventory"),
      {overnight:LIVE.overnight, daytime:LIVE.daytime, updatedAt:Date.now()}); return true; }
  catch(e){ console.warn("settings save failed:", e.message); return false; }
}

/* ───────── pricing + availability ───────── */
function nightlyTotal(r,ci,co){ let t=0,d=new Date(ci+"T00:00:00"),e=new Date(co+"T00:00:00");
  while(d<e){const w=d.getDay(); t+=(w===5||w===6)?Number(r.weekend):Number(r.weekday); d.setDate(d.getDate()+1);} return t; }
function nights(ci,co){ return Math.max(1,Math.round((new Date(co)-new Date(ci))/864e5)); }
function overnightAvail(r,ci,co){ const u=BOOKINGS.filter(b=>b.roomId===r.id&&b.type==="overnight"&&b.checkIn<co&&b.checkOut>ci).length; return r.allocation-u; }
function daytimeAvail(r,date){ const u=BOOKINGS.filter(b=>b.roomId===r.id&&b.type==="daytime"&&b.date===date).length; return r.allocation-u; }
const rooms = () => S.type==="overnight" ? LIVE.overnight : LIVE.daytime;
const currentRoom = () => rooms().find(r=>r.id===S.roomId) || null;
const roomPrice = r => S.type==="overnight" ? nightlyTotal(r,S.checkIn,S.checkOut) : Number(r.price);
const roomAvail = r => S.type==="overnight" ? overnightAvail(r,S.checkIn,S.checkOut) : daytimeAvail(r,S.date);

/* ───────── submit ───────── */
async function submitBooking(){
  S.busy=true; S.error=""; render();
  const room=currentRoom();
  const ref="MID-"+Math.random().toString(36).slice(2,7).toUpperCase();
  const ok = S.type==="overnight" ? overnightAvail(room,S.checkIn,S.checkOut)>0 : daytimeAvail(room,S.date)>0;
  if(!ok){ S.busy=false; S.error="Sorry — that room was just taken. Please pick another."; render(); return; }
  const booking={ ref, type:S.type, roomId:room.id, roomName:room.name,
    checkIn:S.type==="overnight"?S.checkIn:null, checkOut:S.type==="overnight"?S.checkOut:null,
    date:S.type==="daytime"?S.date:null, slot:S.type==="daytime"?room.beds:null,
    guests:S.guests, name:S.name, email:S.email, phone:S.phone, note:S.note,
    total: S.type==="overnight"?nightlyTotal(room,S.checkIn,S.checkOut):Number(room.price), createdAt:Date.now() };
  try{ if(db){const fs=db._fs; await fs.addDoc(fs.collection(db,"bookings"),booking);} BOOKINGS.push(booking); }
  catch(e){ console.warn(e); BOOKINGS.push(booking); }
  if(CONFIG.WEB3FORMS_KEY){
    try{ await fetch("https://api.web3forms.com/submit",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ access_key:CONFIG.WEB3FORMS_KEY,
        subject:`🛎️ New Direct Booking — ${booking.roomName} (${ref})`,
        from_name:`${CONFIG.PROPERTY_NAME} Bookings`, email:booking.email,
        Reference:ref, Guest:booking.name, Phone:booking.phone, Email:booking.email, Room:booking.roomName,
        Stay: booking.type==="overnight"?`${booking.checkIn} → ${booking.checkOut} (${nights(booking.checkIn,booking.checkOut)} nt)`:`${booking.date} · ${booking.slot}`,
        Guests:booking.guests, Total:`$${money(booking.total)} — PAY AT FRONT DESK`, Notes:booking.note||"—" }) });
    }catch(e){ console.warn("email failed:",e.message); }
  }
  S.busy=false; S.confirmation=booking; S.step=4; render();
}

/* ───────── render ───────── */
function set(k,v){ S[k]=v; render(); }
function render(){
  const app=document.getElementById("app");
  if(S.view==="manager"){ app.innerHTML = header(true) + `<main class="max-w-md mx-auto px-5 pb-32">${managerHTML()}</main>`; bind(); return; }
  const room=currentRoom();
  app.innerHTML = header(false) + `<main class="max-w-md mx-auto px-5 pb-32">${stepHTML(room)}</main>` + (S.step<4?footerHTML(room):"");
  bind();
}
function header(isMgr){ return `
  <header class="px-5 py-4 flex items-center justify-between sticky top-0 z-20 bg-green text-ivory" style="padding-top:max(1rem,env(safe-area-inset-top))">
    <div>
      <div class="font-serif text-lg leading-none tracking-wide">${CONFIG.PROPERTY_NAME}</div>
      <div class="text-[10px] tracking-[0.2em] uppercase mt-1 text-brass">${isMgr?"Manager":"Baltimore · Book Direct"}</div>
    </div>
    ${ isMgr
      ? `<button data-exit="1" class="text-xs text-brass font-semibold">Exit ✕</button>`
      : `<div class="flex items-center gap-3">
           <div class="text-right"><div class="text-xs font-semibold text-brass">No fees</div><div class="text-[10px] opacity-80">Pay at desk</div></div>
           <button data-gear="1" title="Manager" class="text-ivory/80 text-lg leading-none">⚙</button>
         </div>` }
  </header>`;
}

function stepHTML(room){
  if(S.step===1) return `
    <div class="pt-5">
      <h1 class="font-serif text-3xl leading-tight">Book direct.<br>Skip the fees.</h1>
      <p class="text-sm text-stone mt-2">Reserve straight with the front desk — same rooms, no Expedia or Dayuse markup. ${CONFIG.PROPERTY_ADDR}, steps from the Aquarium & CFG Bank Arena.</p>
      <div class="mt-5 flex rounded-xl p-1" style="background:#EAE3D3">
        ${["overnight","daytime"].map(k=>`<button data-type="${k}" class="flex-1 py-2.5 rounded-lg text-sm font-medium ${S.type===k?'bg-green text-ivory':'text-stone'}">${k==="overnight"?"Overnight":"Daytime (5 hr)"}</button>`).join("")}
      </div>
      ${S.type==="daytime"?`<p class="text-[12px] text-stone mt-3">💡 Day-use: same room, up to half the overnight price — perfect for rest, work, or before a flight.</p>`:""}
      ${S.type==="overnight"?dateRowHTML():dayDateHTML()}
      <h2 class="font-serif text-xl mt-6 mb-3">Choose your room</h2>
      <div class="space-y-3">${rooms().map(roomCard).join("")}</div>
    </div>`;
  if(S.step===2) return `
    <div class="pt-5">
      <button data-back="1" class="text-sm text-stone mb-4">← Back</button>
      <h2 class="font-serif text-2xl mb-1">Confirm dates & guests</h2>
      <p class="text-sm text-stone mb-5">${room.name}</p>
      ${S.type==="overnight"?dateRowHTML():dayDateHTML()}
      <div class="mt-4 rounded-xl px-4 py-3 bg-card border border-line">
        <div class="text-[10px] uppercase tracking-wider text-stone mb-1">Guests</div>
        <div class="flex items-center justify-between"><span class="text-sm">${S.guests} ${S.guests===1?"guest":"guests"}</span>
          <div class="flex items-center gap-3">
            <button data-g="-1" class="w-8 h-8 rounded-full text-lg text-green" style="background:#EAE3D3">−</button>
            <button data-g="1" class="w-8 h-8 rounded-full text-lg text-green" style="background:#EAE3D3">+</button>
          </div></div>
      </div>
    </div>`;
  if(S.step===3) return `
    <div class="pt-5">
      <button data-back="2" class="text-sm text-stone mb-4">← Back</button>
      <h2 class="font-serif text-2xl mb-1">Your details</h2>
      <p class="text-sm text-stone mb-5">We'll send your confirmation here.</p>
      <div class="space-y-3">
        ${inp("name","Full name","Jane Doe",S.name)}
        ${inp("email","Email","jane@email.com",S.email,"email")}
        ${inp("phone","Phone","(410) 555-0199",S.phone,"tel")}
        ${inp("note","Anything we should know? (optional)","Late arrival, etc.",S.note)}
      </div>
      ${S.error?`<p class="text-sm text-red-700 mt-3">${S.error}</p>`:""}
    </div>`;
  const c=S.confirmation;
  return `
    <div class="pt-6 text-center">
      <div class="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-2xl bg-green text-ivory">✓</div>
      <h2 class="font-serif text-2xl mt-4">You're booked!</h2>
      <p class="text-sm text-stone mt-1">Confirmation <span class="text-brass font-semibold">${c.ref}</span></p>
    </div>
    <div class="mt-5 rounded-2xl p-5 text-center bg-green text-ivory">
      <div class="text-[11px] uppercase tracking-widest text-brass">Show this at the front desk</div>
      <div class="font-serif text-3xl tracking-wider mt-1">${c.ref}</div>
    </div>
    <div class="mt-4 rounded-2xl p-5 space-y-3 bg-card border border-line">
      ${row("Room",c.roomName)}
      ${c.type==="overnight"?row("Check-in",fmt(c.checkIn))+row("Check-out",fmt(c.checkOut))+row("Nights",nights(c.checkIn,c.checkOut)):row("Date",fmt(c.date))+row("Time",c.slot)}
      ${row("Guests",c.guests)}
      <div class="pt-3 border-t border-line flex justify-between"><span class="font-serif text-lg">Total</span><span class="font-serif text-lg text-green">$${money(c.total)}</span></div>
      <p class="text-xs text-stone">💵 Pay this amount at the front desk on arrival.</p>
    </div>
    <div class="mt-4 rounded-xl p-4 text-sm text-stone" style="background:#EFEADC">📧 A confirmation went to <b class="text-ink">${esc(c.email)}</b>, and the front desk at <b class="text-ink">${CONFIG.NOTIFY_EMAIL}</b> was notified.</div>
    <button data-reset="1" class="w-full mt-6 py-3 rounded-xl text-sm font-medium bg-green text-ivory">Make another booking</button>`;
}

function dateRowHTML(){ return `
  <div class="grid grid-cols-2 gap-3 mt-4">
    <label class="rounded-xl px-4 py-3 bg-card border border-line block"><div class="text-[10px] uppercase tracking-wider text-stone mb-1">Check-in</div>
      <input id="ci" type="date" min="${today()}" value="${S.checkIn}" class="w-full bg-transparent outline-none text-sm"></label>
    <label class="rounded-xl px-4 py-3 bg-card border border-line block"><div class="text-[10px] uppercase tracking-wider text-stone mb-1">Check-out</div>
      <input id="co" type="date" min="${addDays(S.checkIn,1)}" value="${S.checkOut}" class="w-full bg-transparent outline-none text-sm"></label>
  </div>`; }
function dayDateHTML(){ return `
  <label class="rounded-xl px-4 py-3 bg-card border border-line block mt-4"><div class="text-[10px] uppercase tracking-wider text-stone mb-1">Date</div>
    <input id="dd" type="date" min="${today()}" value="${S.date}" class="w-full bg-transparent outline-none text-sm"></label>`; }
function roomCard(r){
  const avail=roomAvail(r), sold=avail<=0, sel=S.roomId===r.id, unit=S.type==="daytime"?"/ slot":"/ stay";
  return `<button data-room="${r.id}" ${sold?"disabled":""} class="w-full text-left rounded-2xl p-4 flex items-center justify-between border-[1.5px] ${sel?'border-brass':'border-line'} ${sold?'opacity-50':''} bg-card">
    <div><div class="font-serif text-lg">${r.name}</div>
      <div class="text-xs text-stone mt-0.5">${r.beds} · sleeps ${r.sleeps}</div>
      ${r.tag?`<div class="inline-block text-[10px] mt-1 px-2 py-0.5 rounded-full" style="background:#EAE3D3;color:#1E4034">${r.tag}</div>`:""}
      <div class="text-[11px] mt-1 ${sold?'text-red-700':'text-green'}">${sold?"Sold out":`${avail} left`}</div></div>
    <div class="text-right"><div class="font-serif text-xl text-green">$${money(roomPrice(r))}</div><div class="text-[10px] text-stone">${unit}</div></div>
  </button>`;
}
function inp(k,label,ph,val,type="text"){ return `<label class="rounded-xl px-4 py-3 bg-card border border-line block"><div class="text-[10px] uppercase tracking-wider text-stone mb-1">${label}</div>
  <input data-field="${k}" type="${type}" placeholder="${ph}" value="${esc(val)}" class="w-full bg-transparent outline-none text-sm"></label>`; }
const row=(l,v)=>`<div class="flex justify-between text-sm"><span class="text-stone">${l}</span><span class="font-medium">${v}</span></div>`;

function footerHTML(room){
  const can = S.step===1?(room&&roomAvail(room)>0):S.step===3?(S.name.trim()&&validEmail(S.email)&&S.phone.trim()&&!S.busy):true;
  const label = S.busy?"Reserving…":S.step===3?"Reserve — pay at desk":"Continue";
  const price = room?roomPrice(room):null;
  return `<div class="fixed bottom-0 inset-x-0 px-5 py-3 bg-card border-t border-line" style="padding-bottom:max(0.75rem,env(safe-area-inset-bottom))">
    <div class="max-w-md mx-auto flex items-center justify-between">
      <div>${room?`<div class="font-serif text-lg leading-none">$${money(price)}<span class="text-xs font-sans text-stone ml-1">${S.type==="daytime"?"/ slot":nights(S.checkIn,S.checkOut)>1?"· "+nights(S.checkIn,S.checkOut)+" nights":"/ night"}</span></div><div class="text-[11px] text-stone mt-0.5">${room.name}</div>`:`<div class="text-sm text-stone">Select a room</div>`}</div>
      <button id="next" ${can?"":"disabled"} class="px-6 py-3 rounded-xl text-sm font-semibold ${can?'bg-brass text-white':'bg-brass text-white opacity-40'}">${label}</button>
    </div></div>`;
}

/* ───────── manager ───────── */
function managerHTML(){
  if(!S.mgrAuthed) return `
    <div class="pt-10 max-w-xs mx-auto text-center">
      <div class="text-4xl">🔒</div>
      <h2 class="font-serif text-2xl mt-3">Manager access</h2>
      <p class="text-sm text-stone mt-1 mb-5">Enter the PIN to edit prices & rooms.</p>
      <input id="pin" type="password" inputmode="numeric" value="${esc(S.mgrPin)}" placeholder="• • • •" class="w-full text-center text-2xl tracking-widest rounded-xl px-4 py-3 bg-card border border-line outline-none">
      ${S.mgrMsg?`<p class="text-sm text-red-700 mt-2">${S.mgrMsg}</p>`:""}
      <button id="pingo" class="w-full mt-4 py-3 rounded-xl text-sm font-semibold bg-green text-ivory">Unlock</button>
    </div>`;
  const ov = LIVE.overnight.map((r,i)=>`
    <div class="rounded-xl p-4 bg-card border border-line space-y-2">
      ${mInput(`ov-${i}-name`,"Room name",r.name,"text")}
      <div class="grid grid-cols-3 gap-2">
        ${mInput(`ov-${i}-weekday`,"Weekday $",r.weekday,"number")}
        ${mInput(`ov-${i}-weekend`,"Weekend $",r.weekend,"number")}
        ${mInput(`ov-${i}-allocation`,"# rooms",r.allocation,"number")}
      </div>
    </div>`).join("");
  const dt = LIVE.daytime.map((r,i)=>`
    <div class="rounded-xl p-4 bg-card border border-line space-y-2">
      ${mInput(`dt-${i}-name`,"Slot name",r.name,"text")}
      ${mInput(`dt-${i}-beds`,"Time window",r.beds,"text")}
      <div class="grid grid-cols-2 gap-2">
        ${mInput(`dt-${i}-price`,"Price $",r.price,"number")}
        ${mInput(`dt-${i}-allocation`,"# rooms",r.allocation,"number")}
      </div>
    </div>`).join("");
  const revenue = BOOKINGS.reduce((s,b)=>s+Number(b.total||0),0);
  const list = BOOKINGS.slice().reverse().slice(0,30).map(b=>`
    <div class="rounded-lg px-3 py-2 bg-card border border-line text-xs flex justify-between">
      <div><b>${b.ref}</b> · ${b.roomName}<br><span class="text-stone">${b.type==="overnight"?b.checkIn+" → "+b.checkOut:b.date+" · "+b.slot} · ${esc(b.name)}</span></div>
      <div class="text-green font-semibold">$${money(b.total)}</div>
    </div>`).join("") || `<p class="text-sm text-stone">No bookings yet.</p>`;
  return `
    <div class="pt-5 space-y-5">
      <div class="rounded-2xl p-4 text-ivory bg-green flex justify-between items-center">
        <div><div class="text-[11px] uppercase tracking-widest text-brass">Direct revenue · 0% commission</div>
          <div class="font-serif text-2xl">$${money(revenue)}</div></div>
        <div class="text-right text-xs opacity-80">${BOOKINGS.length} booking${BOOKINGS.length===1?"":"s"}<br>kept in full</div>
      </div>
      ${S.mgrMsg?`<div class="rounded-xl p-3 text-sm text-center" style="background:#DDEAD8;color:#1E4034">${S.mgrMsg}</div>`:""}
      <div><h3 class="font-serif text-xl mb-2">Overnight rooms</h3><div class="space-y-3">${ov}</div></div>
      <div><h3 class="font-serif text-xl mb-2">Daytime slots</h3><div class="space-y-3">${dt}</div></div>
      <button id="msave" class="w-full py-3 rounded-xl text-sm font-semibold bg-brass text-white">Save changes</button>
      <div><h3 class="font-serif text-xl mb-2 mt-2">Recent bookings</h3><div class="space-y-2">${list}</div></div>
    </div>`;
}
function mInput(id,label,val,type){ return `<label class="block"><div class="text-[10px] uppercase tracking-wider text-stone mb-1">${label}</div>
  <input data-m="${id}" type="${type}" ${type==="number"?'step="0.01"':''} value="${esc(val)}" class="w-full rounded-lg px-3 py-2 text-sm bg-ivory border border-line outline-none"></label>`; }

/* ───────── events ───────── */
function bind(){
  const g=document.querySelector("[data-gear]"); if(g) g.onclick=()=>{ S.view="manager"; S.mgrMsg=""; render(); };
  const ex=document.querySelector("[data-exit]"); if(ex) ex.onclick=()=>{ S.view="book"; S.mgrMsg=""; render(); };

  if(S.view==="manager"){
    if(!S.mgrAuthed){
      const pin=document.getElementById("pin"); if(pin) pin.oninput=e=>S.mgrPin=e.target.value;
      const go=document.getElementById("pingo"); if(go) go.onclick=()=>{
        if(S.mgrPin===String(CONFIG.MANAGER_PIN)){ S.mgrAuthed=true; S.mgrPin=""; S.mgrMsg=""; }
        else S.mgrMsg="Wrong PIN. Try again.";
        render();
      };
      return;
    }
    document.querySelectorAll("[data-m]").forEach(i=>i.oninput=e=>{
      const [grp,idx,field]=e.target.dataset.m.split("-");
      const arr = grp==="ov"?LIVE.overnight:LIVE.daytime;
      let v=e.target.value; if(e.target.type==="number") v=v===""?0:Number(v);
      arr[+idx][field]=v;
    });
    const save=document.getElementById("msave"); if(save) save.onclick=async()=>{
      save.textContent="Saving…"; save.disabled=true;
      const ok=await saveSettings();
      S.mgrMsg = ok ? "✓ Saved. Prices are now live." : "Saved on this device. Add Firebase to sync everywhere.";
      render();
    };
    return;
  }

  document.querySelectorAll("[data-type]").forEach(b=>b.onclick=()=>{ S.type=b.dataset.type; S.roomId=null; render(); });
  document.querySelectorAll("[data-room]").forEach(b=>b.onclick=()=>{ S.roomId=b.dataset.room; render(); });
  document.querySelectorAll("[data-back]").forEach(b=>b.onclick=()=>set("step",+b.dataset.back));
  document.querySelectorAll("[data-g]").forEach(b=>b.onclick=()=>{ const r=currentRoom(); S.guests=Math.min(r?.sleeps||4,Math.max(1,S.guests+ +b.dataset.g)); render(); });
  document.querySelectorAll("[data-field]").forEach(i=>i.oninput=e=>{ S[e.target.dataset.field]=e.target.value; });
  const reset=document.querySelector("[data-reset]"); if(reset) reset.onclick=()=>{ S={...S,step:1,roomId:null,name:"",email:"",phone:"",note:"",confirmation:null,error:""}; render(); };
  const ci=document.getElementById("ci"),co=document.getElementById("co"),dd=document.getElementById("dd");
  if(ci) ci.onchange=e=>{ S.checkIn=e.target.value; if(S.checkIn>=S.checkOut) S.checkOut=addDays(S.checkIn,1); render(); };
  if(co) co.onchange=e=>{ S.checkOut=e.target.value; render(); };
  if(dd) dd.onchange=e=>{ S.date=e.target.value; render(); };
  const next=document.getElementById("next"); if(next) next.onclick=()=>{ if(next.disabled) return; if(S.step===3) submitBooking(); else set("step",S.step+1); };
}

/* ───────── boot ───────── */
(async()=>{ await initFirebase(); render(); })();
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{})); }
</script>
</body>
</html>
